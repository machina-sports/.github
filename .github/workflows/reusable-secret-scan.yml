name: Reusable — Secret scan (gitleaks)

on:
  workflow_call:
    inputs:
      config-path:
        description: 'Path to gitleaks config (relative to repo root). Defaults to bundled config.'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch shared gitleaks config
        if: inputs.config-path == ''
        run: |
          curl -sSL -o .gitleaks.toml \
            https://raw.githubusercontent.com/machina-sports/.github/main/configs/gitleaks.toml

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: ${{ inputs.config-path != '' && inputs.config-path || '.gitleaks.toml' }}
