name: Reusable — Release production (gated)

# Triggered in caller on `push: tags: 'v.production-*'`.
# Requires `environment: production` for manual approval gate.
# Tag MUST already have a built image in the registry (re-uses staging build artifact).

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      image-tag:
        description: 'Image tag to deploy. If empty, extracted from GITHUB_REF (works for tag-push triggers).'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Optional Dockerfile if production needs a separate build (otherwise reuses staging image)'
        required: false
        type: string
        default: ''
      build-args:
        required: false
        type: string
        default: ''
      aks-cluster:
        required: false
        type: string
        default: 'mks-community-cluster'
      aks-resource-group:
        required: false
        type: string
        default: 'mks-community-group'
      namespace:
        required: true
        type: string
      deployment-name:
        required: true
        type: string
      container-name:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      REGISTRY_URL:
        required: true
      AZURE_CREDENTIALS:
        required: true
      SLACK_WEBHOOK:
        required: false

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag
        run: |
          if [ -n "${{ inputs.image-tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image-tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Login to Docker Hub
        if: inputs.dockerfile != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push production image
        if: inputs.dockerfile != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: ${{ inputs.build-args }}
          tags: |
            ${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:${{ env.IMAGE_TAG }}
            ${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:production-latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ inputs.aks-cluster }}
          resource-group: ${{ inputs.aks-resource-group }}

      - name: Deploy to AKS production
        run: |
          kubectl set image deployment/${{ inputs.deployment-name }} \
            ${{ inputs.container-name }}=${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:${{ env.IMAGE_TAG }} \
            -n ${{ inputs.namespace }}
          kubectl rollout status deployment/${{ inputs.deployment-name }} -n ${{ inputs.namespace }} --timeout=10m

      - name: Notify Slack — production deployed
        if: success()
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: GitHub Actions
          SLACK_COLOR: 'good'
          SLACK_TITLE: '[PROD] ${{ inputs.app-name }} deployed'
          SLACK_MESSAGE: '${{ inputs.app-name }}:${{ env.IMAGE_TAG }} → ${{ inputs.namespace }}'
          SLACK_ICON: ':rocket:'

      - name: Notify Slack — production deploy failed
        if: failure()
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: GitHub Actions
          SLACK_COLOR: 'danger'
          SLACK_TITLE: '[PROD] ${{ inputs.app-name }} deploy FAILED'
          SLACK_MESSAGE: 'Build or deploy of ${{ inputs.app-name }}:${{ env.IMAGE_TAG }} failed.'
          SLACK_ICON: ':x:'

      - name: Azure cleanup
        if: always()
        run: az account clear
