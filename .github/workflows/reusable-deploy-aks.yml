name: Reusable — Deploy to AKS

# Generic kubectl set image deployment to AKS. Build-and-push happens
# in the caller workflow (because secrets are not in scope inside `with:`
# blocks for workflow_call inputs — see GitHub Actions docs).
#
# Usage:
#   - Set `environment: production` to require manual approval gate.
#   - image-tag must be set explicitly OR resolved from GITHUB_REF (tag-push trigger).

on:
  workflow_call:
    inputs:
      app-name:
        description: 'App / image name (e.g. machina-studio)'
        required: true
        type: string
      image-tag:
        description: 'Image tag. If empty, extracted from GITHUB_REF.'
        required: false
        type: string
        default: ''
      environment:
        description: 'GitHub Environment to bind the deploy to (e.g. production for gated deploys). Empty = no gate.'
        required: false
        type: string
        default: ''
      aks-cluster:
        required: false
        type: string
        default: 'mks-community-cluster'
      aks-resource-group:
        required: false
        type: string
        default: 'mks-community-group'
      namespace:
        required: true
        type: string
      deployment-name:
        required: true
        type: string
      container-name:
        required: true
        type: string
      rollout-timeout:
        required: false
        type: string
        default: '5m'
    secrets:
      REGISTRY_URL:
        required: true
      AZURE_CREDENTIALS:
        required: true
      SLACK_WEBHOOK:
        required: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.app-name }}${{ inputs.environment != '' && format(' to {0}', inputs.environment) || '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Resolve image tag
        run: |
          if [ -n "${{ inputs.image-tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image-tag }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ inputs.aks-cluster }}
          resource-group: ${{ inputs.aks-resource-group }}

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/${{ inputs.deployment-name }} \
            ${{ inputs.container-name }}=${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:${{ env.IMAGE_TAG }} \
            -n ${{ inputs.namespace }}
          kubectl rollout status deployment/${{ inputs.deployment-name }} \
            -n ${{ inputs.namespace }} \
            --timeout=${{ inputs.rollout-timeout }}

      - name: Notify Slack — success
        if: success()
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: GitHub Actions
          SLACK_COLOR: 'good'
          SLACK_TITLE: '[${{ inputs.environment != '' && inputs.environment || 'staging' }}] ${{ inputs.app-name }} deployed'
          SLACK_MESSAGE: '${{ inputs.app-name }}:${{ env.IMAGE_TAG }} → ${{ inputs.namespace }}'
          SLACK_ICON: ':rocket:'

      - name: Notify Slack — failure
        if: failure()
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: GitHub Actions
          SLACK_COLOR: 'danger'
          SLACK_TITLE: '[${{ inputs.environment != '' && inputs.environment || 'staging' }}] ${{ inputs.app-name }} deploy FAILED'
          SLACK_MESSAGE: 'Deploy of ${{ inputs.app-name }}:${{ env.IMAGE_TAG }} to ${{ inputs.namespace }} failed.'
          SLACK_ICON: ':x:'

      - name: Azure cleanup
        if: always()
        run: az account clear
