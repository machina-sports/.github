name: Reusable — Release staging (manual redeploy)

# Manual `workflow_dispatch` trigger to redeploy an already-built image to AKS staging.
# Useful for re-running a known-good tag without rebuilding.

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      image-tag:
        required: true
        type: string
      aks-cluster:
        required: false
        type: string
        default: 'mks-community-cluster'
      aks-resource-group:
        required: false
        type: string
        default: 'mks-community-group'
      namespace:
        required: true
        type: string
      deployment-name:
        required: true
        type: string
      container-name:
        required: true
        type: string
    secrets:
      REGISTRY_URL:
        required: true
      AZURE_CREDENTIALS:
        required: true
      SLACK_WEBHOOK:
        required: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ inputs.aks-cluster }}
          resource-group: ${{ inputs.aks-resource-group }}

      - name: Deploy
        run: |
          kubectl set image deployment/${{ inputs.deployment-name }} \
            ${{ inputs.container-name }}=${{ secrets.REGISTRY_URL }}/${{ inputs.app-name }}:${{ inputs.image-tag }} \
            -n ${{ inputs.namespace }}
          kubectl rollout status deployment/${{ inputs.deployment-name }} -n ${{ inputs.namespace }} --timeout=5m

      - name: Azure cleanup
        if: always()
        run: az account clear
