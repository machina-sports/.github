# Shared lefthook config for machina-sports repos.
# Replaces husky. https://github.com/evilmartians/lefthook
#
# Each repo can override individual hooks via .lefthook-local.yml.

pre-commit:
  parallel: true
  commands:
    no-env-files:
      run: |
        BAD=$(git diff --cached --name-only --diff-filter=ACM \
          | grep -E '(^|/)\.env(\.[^/]+)?$' \
          | grep -vE '\.env\.example($|\.)|\.env\.[^/]+\.example$' || true)
        if [ -n "$BAD" ]; then
          echo "❌ Refusing to commit .env files:"
          echo "$BAD" | sed 's/^/  - /'
          echo "Use .env.example for templates."
          exit 1
        fi
    lint:
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: |
        if [ -f package.json ] && grep -q '"lint"' package.json; then
          # Pick npm/pnpm/bun based on lockfile
          if   [ -f pnpm-lock.yaml ]; then pnpm lint --quiet
          elif [ -f bun.lockb ];      then bun run lint
          else                              npm run --silent lint -- --quiet
          fi
        fi
    typecheck:
      glob: "*.{ts,tsx}"
      run: |
        if [ -f package.json ] && grep -q '"typecheck"' package.json; then
          if   [ -f pnpm-lock.yaml ]; then pnpm typecheck
          elif [ -f bun.lockb ];      then bun run typecheck
          else                              npm run --silent typecheck
          fi
        fi
    python-lint:
      glob: "*.py"
      run: |
        if command -v ruff >/dev/null 2>&1; then
          ruff check {staged_files}
        elif command -v flake8 >/dev/null 2>&1; then
          flake8 {staged_files}
        fi

commit-msg:
  commands:
    conventional:
      run: |
        if [ -f commitlint.config.mjs ] || [ -f commitlint.config.js ]; then
          if   [ -f pnpm-lock.yaml ]; then pnpm exec commitlint --edit "$1"
          elif [ -f bun.lockb ];      then bunx --bun commitlint --edit "$1"
          else                              npx --no-install commitlint --edit "$1"
          fi
        fi
