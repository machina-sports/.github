# Shared gitleaks config for machina-sports repos.
# Default ruleset + Machina-specific allowlists.
# https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

[allowlist]
description = "Global allowlist (test fixtures, examples, public docs)"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)\.env\.[^/]+\.example$''',
  '''(^|/)docs/.*''',
  '''(^|/)README\.md$''',
  '''(^|/)CHANGELOG\.md$''',
  '''(^|/)tests?/fixtures/.*''',
  '''(^|/)__fixtures__/.*''',
]

regexes = [
  # Common placeholder values used in examples
  '''(?i)(your[-_]?api[-_]?key|xxxx+|placeholder|example|dummy)''',

  # PostHog "public" project keys — embedded in the JS bundle by design
  # (NEXT_PUBLIC_POSTHOG_KEY ships to browsers). Not a secret.
  '''phc_[A-Za-z0-9]{40,}''',

  # Google Analytics measurement IDs — public by definition
  '''G-[A-Z0-9]{6,}''',
  '''UA-[0-9]+-[0-9]+''',

  # Stripe publishable keys (pk_live_*, pk_test_*) — meant to be public
  '''pk_(live|test)_[A-Za-z0-9]+''',
]
